name: Refresh Instagram Feed

on:
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: refresh-instagram-feed
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Refresh Instagram feed
        env:
          ALLOW_STALE_INSTAGRAM_ON_FAILURE: "true"
        run: npm run instagram:refresh

      - name: Commit updated feed
        run: |
          if [ -z "$(git status --porcelain -- public/instagram-feed.json public/instagram-cache)" ]; then
            echo "No Instagram changes to commit"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/instagram-feed.json public/instagram-cache
          git commit -m "Refresh Instagram feed cache"
          git push
